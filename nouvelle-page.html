<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLIALU — Studio</title>
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1f2e;color:#e2e8f0;font-size:13px}

/* ── TOPBAR ── */
.topbar{height:52px;background:#141824;border-bottom:1px solid rgba(203,255,0,.12);display:flex;align-items:center;padding:0 16px;gap:14px;flex-shrink:0;position:relative;z-index:10}
.logo{color:#cbff00;font-weight:900;font-size:17px;letter-spacing:1.5px;white-space:nowrap;margin-right:4px}
.topbar-sep{width:1px;height:24px;background:rgba(255,255,255,.08);flex-shrink:0}
.tb-field{display:flex;align-items:center;gap:6px}
.tb-field label{font-size:9px;font-weight:800;color:#4a5a6a;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tb-field input{background:#1e2535;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#e2e8f0;font-size:12px;padding:5px 10px;width:170px;font-family:inherit}
.tb-field input:focus{outline:none;border-color:rgba(203,255,0,.45)}
.tb-field input::placeholder{color:#2d3a4a}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-gen-pdf{background:#cbff00;color:#141824;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s;font-family:inherit}
.btn-gen-pdf:hover{background:#b5e600;transform:translateY(-1px)}

/* ── WORKSPACE ── */
.workspace{display:grid;grid-template-columns:200px 1fr 300px;height:calc(100vh - 52px);overflow:hidden}
.col{overflow-y:auto;overflow-x:hidden;border-right:1px solid rgba(255,255,255,.06)}
.col:last-child{border-right:none}
.col::-webkit-scrollbar{width:3px}
.col::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* ── GAUCHE — FAMILLES ── */
.col-familles{padding:10px 8px}
.search-wrap{margin-bottom:8px}
.search-input{width:100%;background:#1e2535;border:1px solid rgba(255,255,255,.08);border-radius:7px;color:#e2e8f0;font-size:11px;padding:6px 9px;font-family:inherit}
.search-input:focus{outline:none;border-color:rgba(203,255,0,.4)}
.search-input::placeholder{color:#2d3a4a}
.famille-list{display:flex;flex-direction:column;gap:2px}
.famille-btn{display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid rgba(255,255,255,.06);border-radius:7px;cursor:pointer;background:transparent;color:#8090a0;font-size:11px;font-weight:700;text-align:left;transition:.12s;width:100%;font-family:inherit}
.famille-btn:hover{background:rgba(255,255,255,.05);color:#c0ccd8;border-color:rgba(255,255,255,.12)}
.famille-btn.active{background:rgba(203,255,0,.1);border-color:rgba(203,255,0,.3);color:#cbff00}
.fam-thumb{flex-shrink:0;width:34px;height:24px;display:flex;align-items:center;justify-content:center}
.fam-thumb svg{overflow:visible}
.famille-btn:not(.active) .fam-thumb svg{stroke:rgba(128,144,160,.6)}
.famille-btn.active .fam-thumb svg{stroke:#cbff00}
.fam-lbl strong{display:block;font-size:11px;font-weight:700;line-height:1.2}
.fam-lbl span{font-size:9px;opacity:.45;margin-top:1px;display:block}

/* ── CENTRE — CONFIGURATEUR ── */
.col-config{display:flex;flex-direction:column;gap:8px;padding:10px}
.section-lbl{font-size:9px;font-weight:800;color:#3a4a5a;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.section-lbl::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05)}

.articles-wrap{background:#1e2535;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:8px 10px;min-height:38px}
.articles-pills{display:flex;gap:4px;flex-wrap:wrap}
.article-pill{padding:4px 11px;border:1px solid rgba(255,255,255,.1);border-radius:20px;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:#7088a0;transition:.12s;font-family:inherit}
.article-pill:hover{border-color:rgba(203,255,0,.35);color:#cbff00}
.article-pill.active{background:rgba(203,255,0,.13);border-color:#cbff00;color:#cbff00}
.article-pill small{display:block;font-size:9px;opacity:.55}

.iso-wrap{background:#161b28;border:1px solid rgba(255,255,255,.07);border-radius:8px;overflow:hidden;position:relative;height:210px;flex-shrink:0}
#isoCanvas{display:block;width:100%;height:100%}
.iso-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#2d3a4a;font-size:11px;font-weight:600;text-align:center;pointer-events:none;padding:16px}

.saisies-card{background:#1e2535;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 12px}
.saisies-top{display:grid;grid-template-columns:1fr 120px;gap:8px;margin-bottom:10px}
.faces-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.angles-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.params-grid{display:grid;grid-template-columns:1fr 1fr 60px 1fr;gap:6px;margin-top:8px}
.params-grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:6px}

label{display:block;font-size:9px;font-weight:700;color:#4a5a6a;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
input,select{width:100%;padding:6px 8px;border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:12px;background:#141824;color:#e2e8f0;transition:border .15s;font-family:inherit}
input:focus,select:focus{outline:none;border-color:rgba(203,255,0,.5)}
input::placeholder{color:#2a3444}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{opacity:.35}
select option{background:#141824}
.dim-off label{color:#253040}
.dim-off input{background:#161b28;color:#253040;border-style:dashed;cursor:not-allowed}

.results-card{background:#1e2535;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 12px}
.chips-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.chip{background:#141824;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:8px 6px;text-align:center}
.chip.accent{background:rgba(203,255,0,.08);border-color:rgba(203,255,0,.25)}
.chip.has-value{border-color:rgba(203,255,0,.4)}
.chip-lbl{font-size:8px;font-weight:800;color:#3a4a5a;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.chip-val{font-size:13px;font-weight:800;color:#c0ccd8}
.chip.accent .chip-val{color:#cbff00;font-size:16px}
.desig-row{display:flex;gap:6px;margin-bottom:8px}
.desig-input{flex:1;font-size:11px;font-weight:600;color:#a0b0c0}
.ref-input{width:100px;font-size:11px;font-weight:800;color:#cbff00;text-align:center;letter-spacing:.3px}
.actions-bar{display:flex;align-items:center;gap:10px}
.btn-add{background:#cbff00;color:#141824;border:none;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;font-family:inherit}
.btn-add:hover{background:#b5e600;transform:translateY(-1px)}
.msg-ok{display:none;background:rgba(34,197,94,.12);color:#4ade80;border-radius:6px;padding:6px 11px;font-size:11px;font-weight:700}

/* ── DROITE — DEVIS ── */
.col-devis{display:flex;flex-direction:column;padding:10px 10px 10px 10px}
.devis-hd{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:8px;flex-shrink:0}
.devis-hd-title{font-size:10px;font-weight:800;color:#5a6a7a;text-transform:uppercase;letter-spacing:.5px}
.devis-count{font-size:10px;font-weight:700;color:#3a4a5a;background:#161b28;padding:2px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.05)}
.devis-lignes{flex:1;overflow-y:auto;min-height:0}
.devis-lignes::-webkit-scrollbar{width:2px}
.devis-empty{color:#2d3a4a;font-size:11px;font-weight:600;text-align:center;padding:32px 0}
.ligne-item{display:flex;gap:7px;align-items:center;padding:6px 7px;border:1px solid rgba(255,255,255,.06);border-radius:7px;margin-bottom:4px;background:#161b28}
.ligne-thumb{width:42px;height:26px;object-fit:contain;border-radius:3px;border:1px solid rgba(255,255,255,.06);background:#1a1f2e;flex-shrink:0}
.ligne-thumb-empty{width:42px;height:26px;border-radius:3px;border:1px dashed rgba(255,255,255,.08);background:#1a1f2e;flex-shrink:0}
.ligne-info{flex:1;min-width:0}
.ligne-desig{font-size:11px;font-weight:700;color:#b0c0d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ligne-ref{font-size:9px;color:#3a4a5a;margin-top:1px}
.ligne-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ligne-total{font-size:11px;font-weight:800;color:#cbff00}
.ligne-qte-wrap{display:flex;align-items:center;gap:3px}
.ligne-qte{width:32px;padding:2px 3px;text-align:center;font-size:10px;font-weight:700;background:#1a1f2e;border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#c0ccd8;font-family:inherit}
.ligne-qte:focus{outline:none;border-color:rgba(203,255,0,.4)}
.qte-lbl{font-size:9px;color:#3a4a5a}
.btn-del{background:none;border:none;color:#2d3a4a;cursor:pointer;font-size:13px;padding:2px 3px;border-radius:3px;transition:.12s;line-height:1;flex-shrink:0}
.btn-del:hover{color:#f87171;background:rgba(248,113,113,.1)}

.totaux-wrap{border-top:1px solid rgba(255,255,255,.06);padding:8px 0;flex-shrink:0}
.t-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:#4a5a6a}
.t-row .t-val{font-weight:700;color:#7a8a9a}
.t-ttc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:rgba(203,255,0,.08);border-radius:6px;margin-top:4px;border:1px solid rgba(203,255,0,.15)}
.t-ttc-row span{font-size:11px;font-weight:800;color:#cbff00}

.devis-actions{display:flex;gap:6px;padding-top:8px;flex-shrink:0}
.btn-pdf-col{flex:1;background:#cbff00;color:#141824;border:none;border-radius:7px;padding:9px 8px;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;font-family:inherit}
.btn-pdf-col:hover{background:#b5e600}
.btn-vider{background:#1e2535;color:#4a5a6a;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:9px 12px;font-size:11px;font-weight:700;cursor:pointer;transition:.12s;font-family:inherit}
.btn-vider:hover{border-color:rgba(248,113,113,.4);color:#f87171}

/* ── SAVE TOAST ── */
#save-toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(20,24,36,.96);color:#cbff00;padding:5px 14px;border-radius:20px;font-size:10px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:.3px;border:1px solid rgba(203,255,0,.15)}

/* ── RESPONSIVE ── */
@media(max-width:960px){.workspace{grid-template-columns:0px 1fr 270px}.col-familles{display:none}}
@media(max-width:650px){.workspace{grid-template-columns:1fr}.col-devis{display:none}.tb-field{display:none}}
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<header class="topbar">
  <div class="logo">● PLIALU</div>
  <div class="topbar-sep"></div>
  <div class="tb-field">
    <label>Client</label>
    <input type="text" id="inputClient" placeholder="Nom du client…">
  </div>
  <div class="tb-field">
    <label>Affaire</label>
    <input type="text" id="inputAffaire" placeholder="Réf. affaire…">
  </div>
  <div class="topbar-right">
    <button class="btn-gen-pdf" id="btnGenererPDF">📄 Générer PDF</button>
  </div>
</header>

<!-- ══ WORKSPACE 3 COLONNES ══ -->
<div class="workspace">

  <!-- ── COL GAUCHE — FAMILLES ── -->
  <aside class="col col-familles">
    <div class="search-wrap">
      <input type="search" class="search-input" id="searchInput" placeholder="🔍 Famille ou article…">
    </div>
    <div class="famille-list" id="familleList">
      <!-- injecté par JS -->
    </div>
  </aside>

  <!-- ── COL CENTRE — CONFIGURATEUR ── -->
  <main class="col col-config">

    <!-- Articles -->
    <div class="articles-wrap" id="articlesWrap">
      <div class="section-lbl" id="articlesPanelTitle">Articles</div>
      <div class="articles-pills" id="articlesPills">
        <!-- injecté par JS -->
      </div>
    </div>

    <!-- Vue isométrique -->
    <div class="iso-wrap">
      <canvas id="isoCanvas"></canvas>
      <div class="iso-hint" id="isoHint">Sélectionnez un article et renseignez les cotes</div>
    </div>

    <!-- Saisies cotes + paramètres -->
    <div class="saisies-card" id="saisiesCard">

      <!-- Repère + Longueur -->
      <div class="saisies-top">
        <div>
          <label>Repère / Référence</label>
          <input type="text" id="saisieRepere" placeholder="ex : BA-10, CV-RDC…">
        </div>
        <div>
          <label>Longueur (mm)</label>
          <input type="number" id="saisieLg" placeholder="3000" min="1">
        </div>
      </div>

      <!-- Faces A → E -->
      <div class="section-lbl">Faces</div>
      <div class="faces-grid" style="margin-bottom:10px">
        <div class="dim-off" id="fieldA"><label>A mm</label><input type="number" id="saisieA" placeholder="—" min="0"></div>
        <div class="dim-off" id="fieldB"><label>B mm</label><input type="number" id="saisieB" placeholder="—" min="0"></div>
        <div class="dim-off" id="fieldC"><label>C mm</label><input type="number" id="saisieC" placeholder="—" min="0"></div>
        <div class="dim-off" id="fieldD"><label>D mm</label><input type="number" id="saisieD" placeholder="—" min="0"></div>
        <div class="dim-off" id="fieldE"><label>E mm</label><input type="number" id="saisieE" placeholder="—" min="0"></div>
      </div>

      <!-- Angles pliA → pliD -->
      <div class="section-lbl">Angles de pli</div>
      <div class="angles-grid" style="margin-bottom:10px">
        <div class="dim-off" id="fieldPliA"><label>∠A °</label><input type="number" id="saisiePliA" value="90" min="1" max="179"></div>
        <div class="dim-off" id="fieldPliB"><label>∠B °</label><input type="number" id="saisiePliB" value="90" min="1" max="179"></div>
        <div class="dim-off" id="fieldPliC"><label>∠C °</label><input type="number" id="saisiePliC" placeholder="—" min="1" max="179"></div>
        <div class="dim-off" id="fieldPliD"><label>∠D °</label><input type="number" id="saisiePliD" placeholder="—" min="1" max="179"></div>
      </div>

      <!-- Paramètres matière row 1 : Matière | Épaisseur | RAL | Finition -->
      <div class="params-grid">
        <div><label>Matière</label><select id="paramMatiere"></select></div>
        <div><label>Épaisseur</label><select id="paramEpaisseur"></select></div>
        <div><label>RAL</label><input type="text" id="paramRal" placeholder="7016"></div>
        <div><label>Finition</label>
          <select id="paramFinition">
            <option value="M">Mat</option>
            <option value="B">Brillant</option>
            <option value="NF">Non fini</option>
            <option value="ANO">Anodisé</option>
            <option value="BRT">Brut</option>
          </select>
        </div>
      </div>
      <!-- Paramètres row 2 : Qté | Coeff marge | Taux MO -->
      <div class="params-grid2">
        <div><label>Quantité</label><input type="number" id="paramQte" value="1" min="1"></div>
        <div><label>Coeff marge</label><input type="number" id="paramCoefMarge" value="0.65" step="0.01" min="0.1" max="1"></div>
        <div><label>Taux MO (€/s)</label><input type="number" id="paramTauxMo" value="0.017" step="0.001"></div>
      </div>

    </div><!-- /saisies-card -->

    <!-- Résultats -->
    <div class="results-card">
      <div class="chips-row">
        <div class="chip" id="boxDvp">
          <div class="chip-lbl">DVP</div>
          <div class="chip-val" id="resDvp">—</div>
        </div>
        <div class="chip" id="boxSurf">
          <div class="chip-lbl">Surface</div>
          <div class="chip-val" id="resSurface">—</div>
        </div>
        <div class="chip accent" id="boxPU">
          <div class="chip-lbl">PU HT</div>
          <div class="chip-val" id="resPrixUnit">—</div>
        </div>
        <div class="chip" id="boxPT">
          <div class="chip-lbl">Total HT</div>
          <div class="chip-val" id="resPrixTotal">—</div>
        </div>
      </div>
      <div class="desig-row">
        <input type="text" class="desig-input" id="resultDesignation" readonly placeholder="Désignation générée…">
        <input type="text" class="ref-input" id="resultRefMat" readonly placeholder="AL15-7016M">
      </div>
      <div class="actions-bar">
        <button class="btn-add" id="btnAjouterDevis">➕ Ajouter au devis</button>
        <div class="msg-ok" id="msgOk">✅ Ajouté !</div>
      </div>
    </div><!-- /results-card -->

  </main><!-- /col-config -->

  <!-- ── COL DROITE — DEVIS EN COURS ── -->
  <aside class="col col-devis">
    <div class="devis-hd">
      <div class="devis-hd-title">Devis en cours</div>
      <div class="devis-count" id="devisCount">0 pièce</div>
    </div>

    <div class="devis-lignes" id="devisLignes">
      <div class="devis-empty" id="devisEmpty">Aucune pièce ajoutée</div>
    </div>

    <div class="totaux-wrap">
      <div class="t-row"><span>Total HT</span><span class="t-val" id="tHT">0,00 €</span></div>
      <div class="t-row"><span>TVA 20 %</span><span class="t-val" id="tTVA">0,00 €</span></div>
      <div class="t-ttc-row"><span>Total TTC</span><span id="tTTC">0,00 €</span></div>
    </div>

    <div class="devis-actions">
      <button class="btn-pdf-col" id="btnGenPDF">📄 Générer PDF</button>
      <button class="btn-vider" id="btnVider">🗑 Vider</button>
    </div>
  </aside>

</div><!-- /workspace -->

<div id="save-toast"></div>

<!-- données métier (à fournir) -->
<script src="plialu-data.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
// ════════════════════════════════════
// PASSE 2 — Données + Sélection
// ════════════════════════════════════
(() => {

// ── État global ──
let activeFamille = PLIALU_FAMILLES[0];
let activeArticle = null;
let devisLignes   = [];
const SESSION_KEY = 'plialu-session';

// ── Peuple les selects depuis plialu-data.js ──
function initSelects() {
  document.getElementById('paramEpaisseur').innerHTML =
    PLIALU_EPAISSEURS.map(e =>
      `<option value="${e.valeur}"${e.valeur===0.75?' selected':''}>${e.valeur} mm</option>`
    ).join('');
  document.getElementById('paramFinition').innerHTML =
    PLIALU_FINITIONS.map(f =>
      `<option value="${f.code}">${f.label}</option>`
    ).join('');
  document.getElementById('paramMatiere').innerHTML =
    `<option value="ALU">Aluminium</option>`;
}

// ── SVGs schématiques par famille ──
const FAM_SVG = {
  'Bavette':            '<polyline points="4,8 22,8 22,24"/>',
  'Bavette Accessoire': '<polyline points="4,8 22,8 22,24"/><circle cx="32" cy="16" r="4" fill="none"/>',
  'Couvertine':         '<polyline points="4,22 4,10 21,10 21,6 38,6 38,10 38,22"/>',
  'Couvertine Accessoire': '<polyline points="6,22 6,12 20,12 20,7 36,7 36,12"/><circle cx="36" cy="22" r="4" fill="none"/>',
  'Couvre Joint':       '<polyline points="4,18 10,18 10,8 30,8 30,18 36,18"/>',
  'Departs':            '<polyline points="4,22 4,10 22,10"/><polyline points="22,10 36,10 36,22"/>',
  'Divers':             '<rect x="8" y="9" width="24" height="14" rx="1"/>',
  'GeExtrude':          '<polyline points="4,22 4,8 36,8 36,22"/>',
  'Habillage':          '<polyline points="4,14 34,14 34,22"/><polyline points="4,14 4,8"/>',
  'Lateraux':           '<polyline points="4,22 4,8"/><line x1="4" y1="15" x2="36" y2="15"/>',
  'Lisses':             '<line x1="4" y1="16" x2="38" y2="16"/>',
  'Profils Divers':     '<polyline points="4,22 4,10 14,10 14,16 26,16 26,10 36,10 36,22"/>',
  'Solin et Ge Pliées': '<polyline points="4,22 4,10 36,6"/>',
  'Solins et Ge Pliées Accessoires': '<polyline points="4,22 4,10 36,6"/><circle cx="36" cy="6" r="4" fill="none"/>',
  'Test':               '<line x1="4" y1="20" x2="36" y2="20"/><line x1="20" y1="8" x2="20" y2="20"/>'
};
function svgForFamille(nom) {
  const p = FAM_SVG[nom] || '<polyline points="4,16 38,16"/>';
  return `<svg width="34" height="24" viewBox="0 0 42 32" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
}

// ── Rendu liste familles (filtrable) ──
function renderFamilles(filter) {
  const q = (filter || '').toLowerCase();
  const list = document.getElementById('familleList');
  const visible = PLIALU_FAMILLES.filter(f =>
    !q || f.toLowerCase().includes(q) ||
    getArticlesByFamille(f).some(a => a.article.toLowerCase().includes(q))
  );
  list.innerHTML = visible.map(f => {
    const n = getArticlesByFamille(f).length;
    return `<button class="famille-btn${f===activeFamille?' active':''}" data-famille="${f}">
      <div class="fam-thumb">${svgForFamille(f)}</div>
      <div class="fam-lbl"><strong>${f}</strong><span>${n} art.</span></div>
    </button>`;
  }).join('');
  list.querySelectorAll('.famille-btn').forEach(btn =>
    btn.addEventListener('click', () => selectFamille(btn.dataset.famille))
  );
}
// ── Sélection famille ──
function selectFamille(f) {
  activeFamille = f;
  const arts = getArticlesByFamille(f);
  activeArticle = arts.length ? arts[0].article : null;
  renderFamilles(document.getElementById('searchInput').value);
  renderArticles(f);
  updateFields(); drawIso(); calculeResultats();
  saveSession();
}

// ── Rendu pills articles ──
function renderArticles(famille, filter) {
  const q = (filter || document.getElementById('searchInput').value).toLowerCase();
  const arts = getArticlesByFamille(famille).filter(a =>
    !q || a.article.toLowerCase().includes(q) || famille.toLowerCase().includes(q)
  );
  const title = document.getElementById('articlesPanelTitle');
  if (title) title.textContent = `${famille} — ${arts.length} article${arts.length>1?'s':''}`;
  document.getElementById('articlesPills').innerHTML = arts.map(a =>
    `<button class="article-pill${a.article===activeArticle?' active':''}" data-art="${a.article}">${a.article}</button>`
  ).join('');
  document.getElementById('articlesPills').querySelectorAll('.article-pill').forEach(btn =>
    btn.addEventListener('click', () => selectArticle(btn.dataset.art))
  );
}

// ── Sélection article ──
function selectArticle(art) {
  activeArticle = art;
  renderArticles(activeFamille);
  updateFields(); drawIso(); calculeResultats();
  saveSession();
}

// ── Recherche live ──
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value;
  renderFamilles(q);
  renderArticles(activeFamille, q);
});

// ── Save session ──
function saveSession() {
  try {
    const get = id => { const el = document.getElementById(id); return el ? el.value : ''; };
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      famille: activeFamille, article: activeArticle, devisLignes,
      epaisseur: parseFloat(get('paramEpaisseur')), ral: get('paramRal'),
      finition: get('paramFinition'), qte: get('paramQte'),
      coefMarge: get('paramCoefMarge'), tauxMo: get('paramTauxMo'),
      repere: get('saisieRepere'), lg: get('saisieLg'),
      A: get('saisieA'), B: get('saisieB'), C: get('saisieC'),
      D: get('saisieD'), E: get('saisieE'),
      pliA: get('saisiePliA'), pliB: get('saisiePliB'),
      pliC: get('saisiePliC'), pliD: get('saisiePliD'),
      client: get('inputClient'), affaire: get('inputAffaire')
    }));
    showToast();
  } catch(e) {}
}

// ── Load session ──
function loadSession() {
  let s; try { s = JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) {}
  if (!s) return;
  if (s.famille && PLIALU_FAMILLES.includes(s.famille)) activeFamille = s.famille;
  if (s.article) activeArticle = s.article;
  if (Array.isArray(s.devisLignes)) devisLignes = s.devisLignes;
  const map = {
    paramEpaisseur:s.epaisseur, paramRal:s.ral, paramFinition:s.finition,
    paramQte:s.qte, paramCoefMarge:s.coefMarge, paramTauxMo:s.tauxMo,
    saisieRepere:s.repere, saisieLg:s.lg,
    saisieA:s.A, saisieB:s.B, saisieC:s.C, saisieD:s.D, saisieE:s.E,
    saisiePliA:s.pliA, saisiePliB:s.pliB, saisiePliC:s.pliC, saisiePliD:s.pliD,
    inputClient:s.client, inputAffaire:s.affaire
  };
  Object.entries(map).forEach(([id, val]) => {
    if (val == null || val === '') return;
    const el = document.getElementById(id); if (el) el.value = val;
  });
}

// ── Toast ──
function showToast() {
  const t = document.getElementById('save-toast');
  if (!t) return;
  t.textContent = '💾 Sauvegardé';
  t.style.opacity = '1';
  clearTimeout(t._ti);
  t._ti = setTimeout(() => { t.style.opacity = '0'; }, 1600);
}

// ── Auto-save params ──
['paramEpaisseur','paramRal','paramFinition','paramQte','paramCoefMarge',
 'paramTauxMo','inputClient','inputAffaire'].forEach(id => {
  const el = document.getElementById(id);
  if (el) { el.addEventListener('input', saveSession); el.addEventListener('change', saveSession); }
});

// ── Inférence plis depuis le nom de l'article ──
function _mkplis(n) {
  const k = Math.max(1, Math.min(4, n));
  const F = { 1:['A','B'], 2:['A','B','C'], 3:['A','B','C','D'], 4:['A','B','C','D','E'] };
  const A = { 1:['pliA'], 2:['pliA','pliB'], 3:['pliA','pliB','pliC'], 4:['pliA','pliB','pliC','pliD'] };
  return { plis:k, faces:F[k], angles:A[k] };
}

function getPlisFromArticle(name) {
  // Couvertine spéciaux (testés en premier)
  if (/[Pp]late\s+2\s*[Rr]abat|[Pp]ente/i.test(name))                return _mkplis(3);
  if (/[Pp]late\s+1\s*[Rr]abat|[Cc]oll[eé]e|[Cc]lipse/i.test(name)) return _mkplis(2);
  // Motif "N Plis" / "N pli" dans le nom
  const m = name.match(/([1-4])\s*[Pp]li/);
  if (m) return _mkplis(parseInt(m[1]));
  // Motif PrefixN (Bv2, Bv3, Bv4 …) : lettre(s) + chiffre + autre lettre
  const p = name.match(/[A-Za-z]+([2-4])[A-Za-z]/);
  if (p) return _mkplis(parseInt(p[1]));
  return _mkplis(1); // défaut : 2 faces, 1 angle
}

// ── Activation / désactivation des champs selon l'article actif ──
function updateFields() {
  const art = activeArticle ? getPlisFromArticle(activeArticle) : _mkplis(1);
  ['A','B','C','D','E'].forEach(f => {
    const on   = art.faces.includes(f);
    const wrap = document.getElementById('field' + f);
    const inp  = document.getElementById('saisie' + f);
    if (wrap) wrap.classList.toggle('dim-off', !on);
    if (inp)  { inp.disabled = !on; if (!on) inp.value = ''; }
  });
  ['pliA','pliB','pliC','pliD'].forEach(a => {
    const on  = art.angles.includes(a);
    const KEY = a[0].toUpperCase() + a.slice(1); // pliA → PliA
    const wrap = document.getElementById('field' + KEY);
    const inp  = document.getElementById('saisie' + KEY);
    if (wrap) wrap.classList.toggle('dim-off', !on);
    if (inp)  { inp.disabled = !on; if (!on) inp.value = ''; else if (!inp.value) inp.value = '90'; }
  });
  // Auto-save à chaque saisie
  ['A','B','C','D','E','PliA','PliB','PliC','PliD'].forEach(f => {
    const el = document.getElementById('saisie' + f);
    if (el && !el._wired) {
      el.addEventListener('input', () => { drawIso(); calculeResultats(); saveSession(); });
      el._wired = true;
    }
  });
  ['saisieLg','saisieRepere'].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el._wired) {
      el.addEventListener('input', () => { drawIso(); calculeResultats(); saveSession(); });
      el._wired = true;
    }
  });
  const hint = document.getElementById('isoHint');
  if (hint) hint.style.display = 'none';
}

// ── Vue ISO — debounced ──
let _isoTimer = null;
function drawIso() {
  clearTimeout(_isoTimer);
  _isoTimer = setTimeout(_renderIso, 150);
}

function _renderIso() {
  const canvas = document.getElementById('isoCanvas');
  if (!canvas) return;
  const ctx  = canvas.getContext('2d');
  const wrap = canvas.parentElement;
  const W    = wrap.clientWidth  || 600;
  const H    = wrap.clientHeight || 280;
  const dpr  = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.clearRect(0, 0, W, H);

  const art      = activeArticle ? getPlisFromArticle(activeArticle) : _mkplis(1);
  const faceVals = art.faces.map(f =>
    parseFloat(document.getElementById('saisie' + f).value) || 0);
  const angleVals = art.angles.map(a => {
    const key = a[0].toUpperCase() + a.slice(1);
    return parseFloat(document.getElementById('saisie' + key).value) || 90;
  });
  const Lg  = parseFloat(document.getElementById('saisieLg').value) || 0;
  const DVP = faceVals.reduce((s, v) => s + v, 0);

  if (DVP === 0) {
    ctx.fillStyle = '#2d3a4a';
    ctx.font = '600 12px "Segoe UI",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Saisissez les cotes pour afficher la pièce', W / 2, H / 2);
    return;
  }

  // ── 1. Profil 2D en mm ──
  let dirDeg = 180;
  const profile = [{ x: 0, y: 0 }];
  for (let i = 0; i < faceVals.length; i++) {
    const rad  = dirDeg * Math.PI / 180;
    const prev = profile[profile.length - 1];
    profile.push({ x: prev.x + Math.cos(rad) * faceVals[i],
                   y: prev.y + Math.sin(rad) * faceVals[i] });
    if (i < angleVals.length) dirDeg -= (180 - angleVals[i]);
  }

  // ── 2. Projection isométrique ──
  const c30 = Math.cos(Math.PI / 6);
  const s30 = Math.sin(Math.PI / 6);
  const toIso = (px, py, z = 0) => ({
    x: (px - z) * c30,
    y:  py + (px + z) * s30
  });

  const LgVis = Lg > 0 ? Math.min(Lg, DVP * 2.5) : DVP * 1.5;

  // ── 3. Bounding box → fitScale ──
  const rawPts = [];
  profile.forEach(p => {
    rawPts.push(toIso(p.x, p.y, 0));
    rawPts.push(toIso(p.x, p.y, LgVis));
  });
  const rxs = rawPts.map(p => p.x), rys = rawPts.map(p => p.y);
  const bx0 = Math.min(...rxs), bx1 = Math.max(...rxs);
  const by0 = Math.min(...rys), by1 = Math.max(...rys);
  const bw = bx1 - bx0 || 1, bh = by1 - by0 || 1;
  const PAD = 52;
  const sc  = Math.min((W - PAD * 2) / bw, (H - PAD * 2) / bh);
  const ox  = W / 2 - (bx0 + bw / 2) * sc;
  const oy  = H / 2 - (by0 + bh / 2) * sc;

  const toScreen = (px, py, z = 0) => {
    const p = toIso(px, py, z);
    return { x: p.x * sc + ox, y: p.y * sc + oy };
  };

  const cent = toScreen(
    profile.reduce((s, p) => s + p.x, 0) / profile.length,
    profile.reduce((s, p) => s + p.y, 0) / profile.length, 0);

  // ── 4. Quads extrudés ──
  for (let i = 0; i < faceVals.length; i++) {
    if (faceVals[i] === 0) continue;
    const a = toScreen(profile[i].x,   profile[i].y,   0);
    const b = toScreen(profile[i+1].x, profile[i+1].y, 0);
    const c = toScreen(profile[i+1].x, profile[i+1].y, LgVis);
    const d = toScreen(profile[i].x,   profile[i].y,   LgVis);
    const horiz = Math.abs(profile[i+1].y - profile[i].y) <=
                  Math.abs(profile[i+1].x - profile[i].x);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.lineTo(c.x, c.y); ctx.lineTo(d.x, d.y);
    ctx.closePath();
    ctx.fillStyle = horiz ? 'rgba(255,182,220,0.5)' : 'rgba(220,150,190,0.4)';
    ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.2; ctx.stroke();
  }

  // ── 5. Profils avant/arrière ──
  const strokeProfil = (z, lw, col) => {
    ctx.beginPath();
    const s0 = toScreen(profile[0].x, profile[0].y, z);
    ctx.moveTo(s0.x, s0.y);
    for (let i = 1; i < profile.length; i++) {
      const p = toScreen(profile[i].x, profile[i].y, z);
      ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.stroke();
  };
  strokeProfil(LgVis, 1, '#888');
  strokeProfil(0,     2, '#111');

  // ── 6. Labels faces (magenta) ──
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  art.faces.forEach((face, i) => {
    if (faceVals[i] === 0) return;
    const mid = toScreen(
      (profile[i].x + profile[i+1].x) / 2,
      (profile[i].y + profile[i+1].y) / 2, 0);
    const sa = toScreen(profile[i].x, profile[i].y, 0);
    const sb = toScreen(profile[i+1].x, profile[i+1].y, 0);
    const sdx = sb.x - sa.x, sdy = sb.y - sa.y;
    const slen = Math.hypot(sdx, sdy) || 1;
    let nx = -sdy / slen, ny = sdx / slen;
    if ((cent.x - mid.x) * nx + (cent.y - mid.y) * ny > 0) { nx = -nx; ny = -ny; }
    const lx = mid.x + nx * 18, ly = mid.y + ny * 18;
    ctx.font = 'bold 11px "Segoe UI",sans-serif';
    ctx.fillStyle = '#e60090';
    ctx.fillText(face, lx, ly);
    if (faceVals[i] >= 5) {
      ctx.font = '9px "Segoe UI",sans-serif';
      ctx.fillStyle = '#b3006e';
      ctx.fillText(faceVals[i] + ' mm', lx, ly + 13);
    }
  });

  // ── 7. Labels angles (rouge) ──
  art.angles.forEach((angle, i) => {
    const p = toScreen(profile[i + 1].x, profile[i + 1].y, 0);
    ctx.font = 'bold 10px "Segoe UI",sans-serif';
    ctx.fillStyle = '#cc0000';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(angleVals[i] + '°', p.x + 6, p.y - 9);
  });

  // ── 8. Label Lg ──
  if (Lg > 0) {
    const pa = toScreen(profile[0].x, profile[0].y, 0);
    const pb = toScreen(profile[0].x, profile[0].y, LgVis);
    ctx.font = 'bold 10px "Segoe UI",sans-serif';
    ctx.fillStyle = '#e60090';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('Lg = ' + Lg + ' mm', (pa.x + pb.x) / 2, Math.min(pa.y, pb.y) - 4);
  }
}

// ── Calculs — stub Passe 3B ──
function calculeResultats() {}

// ── INIT ──
initSelects();
loadSession();
renderFamilles();
renderArticles(activeFamille);

})();
