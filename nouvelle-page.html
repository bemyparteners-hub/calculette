<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLIALU — Configurateur</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--panel:#ffffff;--line:#e3e6ea;--line-strong:#d0d4da;
  --text:#2b2f36;--muted:#6b7280;--accent:#3b82f6;--accent-soft:#eff6ff;
  --danger:#e11d48;--fold:#c026d3;--radius:6px;--radius-lg:10px;
}
body{background:var(--bg);font-family:system-ui,sans-serif;font-size:13px;color:var(--text);padding:12px;min-height:100vh;}
.app{min-height:calc(100vh - 24px);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);display:grid;grid-template-rows:auto 1fr auto;overflow:hidden;}

/* ── Titlebar ── */
.titlebar{display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--line);background:#1a1f2e;flex-wrap:wrap;}
.logo{font-size:15px;font-weight:800;letter-spacing:.5px;color:#cbff00;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.logo::before{content:'●';color:#cbff00;font-size:11px;}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,.15);margin:0 4px;}
.tb-field{display:flex;align-items:center;gap:6px;}
.tb-field label{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;font-weight:500;}
.tb-field input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius);color:#fff;padding:4px 8px;font-size:12px;width:160px;outline:none;}
.tb-field input::placeholder{color:rgba(255,255,255,.3);}
.tb-field input:focus{border-color:#cbff00;background:rgba(203,255,0,.06);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.btn-pdf{background:#cbff00;color:#1a1f2e;border:none;border-radius:var(--radius);padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.3px;}
.btn-pdf:hover{background:#d8ff33;}

/* ── Main grid ── */
.main{padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-content:start;}
.fieldset{border:1px solid var(--line);border-radius:var(--radius);background:#fff;display:flex;flex-direction:column;overflow:hidden;}
.fs-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:9px 12px 7px;border-bottom:1px solid var(--line);background:#fafbfc;flex-shrink:0;}
.fs-body{padding:10px 12px;display:flex;flex-direction:column;gap:7px;flex:1;}

/* ── Article select ── */
.article-preview{border:1px solid var(--line);border-radius:4px;background:#fafbfc;height:80px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.article-preview svg{max-width:100%;max-height:100%;}

/* ── Paramètres ── */
.param-row{display:grid;grid-template-columns:auto 1fr;gap:5px 8px;align-items:center;}
.param-row label{font-size:11px;color:var(--muted);white-space:nowrap;}
.param-row input,.param-row select{border:1px solid var(--line);border-radius:4px;padding:4px 7px;font-size:12px;background:#fff;color:var(--text);outline:none;width:100%;}
.param-row input:focus,.param-row select:focus{border-color:var(--accent);}
.param-static{font-size:12px;font-weight:600;color:var(--text);}

/* ── Row bottom ── */
.row-bottom{grid-column:1/-1;display:grid;grid-template-columns:260px 1fr 1fr;gap:10px;}
.panel-full{border:1px solid var(--line);border-radius:var(--radius);background:#fff;display:flex;flex-direction:column;min-height:440px;overflow:hidden;}

/* ── Devis panel ── */
.devis-lignes{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
.ligne-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border:1px solid var(--line);border-radius:4px;background:#fafbfc;font-size:11px;}
.ligne-item .li-thumb{width:36px;height:28px;flex-shrink:0;border:1px solid var(--line);border-radius:3px;background:#f0f1f4;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.ligne-item .li-info{flex:1;min-width:0;}
.ligne-item .li-ref{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ligne-item .li-sub{color:var(--muted);}
.ligne-item .li-pu{text-align:right;font-weight:700;white-space:nowrap;color:var(--text);}
.ligne-item .li-del{color:var(--danger);cursor:pointer;font-size:14px;line-height:1;padding:1px 2px;flex-shrink:0;}
.devis-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;font-style:italic;}
.devis-totaux{border-top:1px solid var(--line);padding:8px 12px;display:flex;flex-direction:column;gap:3px;}
.t-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}
.t-row span:last-child{font-weight:600;color:var(--text);}
.t-ttc-row{display:flex;justify-content:space-between;align-items:center;background:#1a1f2e;color:#fff;border-radius:4px;padding:6px 10px;margin-top:4px;font-size:13px;font-weight:700;}
.t-ttc-row span:last-child{color:#cbff00;font-size:15px;}
.devis-actions{padding:8px 10px;border-top:1px solid var(--line);display:flex;gap:6px;}
.btn-gen-pdf{flex:1;background:#cbff00;color:#1a1f2e;border:none;border-radius:var(--radius);padding:6px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-gen-pdf:hover{background:#d8ff33;}
.btn-vider{background:#fef2f2;color:var(--danger);border:1px solid #fecaca;border-radius:var(--radius);padding:6px 10px;font-size:11px;cursor:pointer;}
.btn-vider:hover{background:#fee2e2;}

/* ── Render areas ── */
.render-area{flex:1;border:1px solid var(--line);border-radius:4px;background:#fafbfc;position:relative;overflow:hidden;min-height:200px;}
.render-area svg{width:100%;height:100%;}
.render-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;font-style:italic;}

/* ── Saisies ── */
.saisie-row{display:flex;align-items:center;gap:6px;}
.saisie-row label{font-size:11px;color:var(--muted);width:55px;flex-shrink:0;}
.saisie-row input{flex:1;border:1px solid var(--line);border-radius:4px;padding:4px 7px;font-size:12px;outline:none;}
.saisie-row input:focus{border-color:var(--accent);}
.saisie-row.dim-angle label{color:var(--fold);}
.saisie-row.dim-angle input{border-color:#e9d5ff;}
.saisie-row.dim-off{opacity:.3;pointer-events:none;}

/* ── Footer ── */
.footer{border-top:1px solid var(--line);padding:6px 14px;display:flex;align-items:center;gap:8px;background:#fafbfc;flex-wrap:wrap;}
.footer-results{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.fr-chip{font-size:11px;color:var(--muted);background:#f0f1f4;border:1px solid var(--line);border-radius:4px;padding:3px 7px;white-space:nowrap;}
.fr-chip strong{color:var(--text);font-weight:700;margin-left:3px;}
.fr-chip.fr-total strong{color:var(--accent);}
.fr-ref{font-size:11px;font-weight:700;color:var(--text);letter-spacing:.3px;white-space:nowrap;border-left:1px solid var(--line);padding-left:8px;}
.footer input{flex:1;min-width:120px;border:1px solid var(--line);border-radius:var(--radius);padding:5px 10px;font-size:12px;color:var(--text);outline:none;}
.footer input:focus{border-color:var(--accent);}
.btn-add-devis{background:#cbff00;color:#1a1f2e;border:none;border-radius:var(--radius);padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.btn-add-devis:hover{background:#d8ff33;}

/* ── Misc ── */
select,input[type=text],input[type=number]{font-family:inherit;}
.lbl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;}

/* ── Autocomplete matière ── */
.mat-dd{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:300;max-height:180px;overflow-y:auto;display:none;}
.mat-opt{padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--line);font-size:11px;line-height:1.4;}
.mat-opt:last-child{border-bottom:none;}
.mat-opt:hover,.mat-opt.focused{background:var(--accent-soft);}
.mat-opt strong{color:var(--text);}
.mat-opt small{color:var(--muted);margin-left:5px;}
.param-readonly{border:1px solid var(--line);border-radius:4px;padding:4px 7px;font-size:12px;background:#f8f9fa;color:var(--text);width:100%;cursor:default;}
</style>
</head>
<body>
<div class="app">

  <!-- Titlebar -->
  <div class="titlebar">
    <span class="logo">PLIALU</span>
    <div class="tb-sep"></div>
    <div class="tb-field"><label>CLIENT</label><input id="inputClient" placeholder="Raison sociale…"></div>
    <div class="tb-field"><label>AFFAIRE</label><input id="inputAffaire" placeholder="Référence chantier…"></div>
    <div class="tb-right">
      <button class="btn-pdf" id="btnGenererPDF">📄 PDF</button>
    </div>
  </div>

  <!-- Main 4-col grid -->
  <div class="main">

    <!-- Col 1 : Gammes -->
    <div class="fieldset">
      <div class="fs-title">Gammes</div>
      <div class="fs-body">
        <select id="gammeSelect" style="border:1px solid var(--line);border-radius:4px;padding:5px 7px;font-size:12px;background:#fff;color:var(--text);outline:none;width:100%;"></select>
      </div>
    </div>

    <!-- Col 2 : Articles -->
    <div class="fieldset">
      <div class="fs-title" id="articlesTitle">Articles</div>
      <div class="fs-body">
        <div class="article-preview" id="articlePreview">
          <img id="articleImg" src="" alt=""
               style="width:100%;height:100%;object-fit:contain;display:none;">
          <svg id="articleSvgFallback" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="28" width="60" height="10" rx="1" fill="#e3e6ea"/>
          </svg>
        </div>
        <div class="lbl">Article</div>
        <select id="article" style="border:1px solid var(--line);border-radius:4px;padding:5px 7px;font-size:12px;background:#fff;color:var(--text);outline:none;width:100%;">
          <option value="">— choisir une gamme —</option>
        </select>
      </div>
    </div>

    <!-- Col 3 : Paramètres -->
    <div class="fieldset">
      <div class="fs-title">Paramètres</div>
      <div class="fs-body">
        <div class="param-row" style="grid-column:1/-1;">
          <label style="margin-bottom:3px;">Matière</label>
          <div style="position:relative;">
            <input id="matInput" type="text" placeholder="Tapez RAL, nom, épaisseur…" autocomplete="off"
                   style="border:1px solid var(--line);border-radius:4px;padding:4px 7px;font-size:12px;width:100%;outline:none;">
            <div id="matDropdown" class="mat-dd"></div>
          </div>
        </div>
        <div class="param-row">
          <label>Quantité</label>
          <input id="quantite" type="number" value="1" min="1" step="1">
        </div>
      </div>
    </div>

    <!-- Row bottom : 3 panels -->
    <div class="row-bottom">

      <!-- Panel gauche : Devis en cours -->
      <div class="panel-full">
        <div class="fs-title">Devis en cours</div>
        <div class="devis-lignes" id="devisLignes">
          <div class="devis-empty" id="devisEmpty">Aucun article ajouté</div>
        </div>
        <div class="devis-totaux">
          <div class="t-row"><span>Total HT</span><span id="tHT">0,00 €</span></div>
          <div class="t-row"><span>TVA 20 %</span><span id="tTVA">0,00 €</span></div>
          <div class="t-ttc-row"><span>TTC</span><span id="tTTC">0,00 €</span></div>
        </div>
        <div class="devis-actions">
          <button class="btn-gen-pdf" id="btnGenPDF">📄 Générer PDF</button>
          <button class="btn-vider" id="btnVider">Vider</button>
        </div>
      </div>

      <!-- Panel centre : Développé à plat -->
      <div class="panel-full">
        <div class="fs-title">Développé à plat</div>
        <div style="padding:8px;flex:1;display:flex;flex-direction:column;">
          <div class="render-area" id="flatArea">
            <div class="render-placeholder" id="flatPlaceholder">Saisissez les cotes</div>
            <svg id="flatSvg" style="display:none;" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>
      </div>

      <!-- Panel droit : Rendu 3D + Saisies -->
      <div class="panel-full">
        <div class="fs-title">Rendu 3D + Saisies</div>
        <div style="display:flex;flex-direction:column;flex:1;padding:8px;gap:8px;overflow:hidden;">
          <div class="render-area" id="isoArea" style="min-height:180px;flex:1;">
            <div class="render-placeholder" id="isoPlaceholder">Saisissez les cotes</div>
            <svg id="iso3d" style="display:none;" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
          <div class="lbl" style="flex-shrink:0;">Saisies (mm / °)</div>
          <div style="overflow-y:auto;flex-shrink:0;max-height:160px;">
            <div id="saisiesContainer" style="display:grid;grid-template-columns:1fr 1fr;gap:5px;"></div>
          </div>
          <div class="saisie-row" style="flex-shrink:0;border-top:1px solid var(--line);padding-top:6px;">
            <label style="width:65px;font-size:11px;color:var(--muted);">Long. mm</label>
            <input id="saisieLongueur" type="number" placeholder="Longueur" style="flex:1;border:1px solid var(--line);border-radius:4px;padding:4px 7px;font-size:12px;outline:none;">
          </div>
        </div>
      </div>

    </div><!-- /.row-bottom -->
  </div><!-- /.main -->

  <!-- Footer -->
  <div class="footer">
    <div class="footer-results">
      <span class="fr-chip">DVP <strong id="resDvp">—</strong></span>
      <span class="fr-chip">Surface <strong id="resSurface">—</strong></span>
      <span class="fr-chip">PU <strong id="resPrixUnit">—</strong></span>
      <span class="fr-chip fr-total">Total <strong id="resPrixTotal">—</strong></span>
      <span class="fr-ref" id="resRefMat">—</span>
    </div>
    <input id="resultDesignation" type="text" placeholder="Désignation article…">
    <button class="btn-add-devis" id="btnAjouterDevis">➕ Ajouter au devis</button>
  </div>

</div><!-- /.app -->

<script src="plialu-materials.js"></script>
<script src="plialu-data.js"></script>
<script>
// ── Bloc A : Init + Gammes + Articles ──
(() => {
let activeFamille  = PLIALU_FAMILLES[0];
let activeArticle  = '';
let activeMaterial = null;

const PLIALU_TARIFS_FAM = {
  'Alu laqué':          22.00,
  'Aluminium standard': 18.00,
  'Aluminium brut':     15.00,
  'Acier laqué':        19.00,
  'Acier standard':     14.00,
  'Acier brut':         11.00
};


function renderGammes() {
  const sel = document.getElementById('gammeSelect');
  sel.innerHTML = '';
  PLIALU_FAMILLES.forEach(f => {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    if (f === activeFamille) o.selected = true;
    sel.appendChild(o);
  });
}

function selectFamille(f) {
  activeFamille = f;
  activeArticle = '';
  document.getElementById('articlesTitle').textContent = f;
  renderArticles();
}

function renderArticles() {
  const sel = document.getElementById('article');
  sel.innerHTML = '<option value="">— choisir —</option>';
  getArticlesByFamille(activeFamille).forEach(a => {
    const o = document.createElement('option');
    o.value = a.article;
    o.textContent = a.article;
    if (a.article === activeArticle) o.selected = true;
    sel.appendChild(o);
  });
}

function getArticleImageUrl(articleName) {
  const slug = articleName.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_\-]/g, '');
  return `img/pieces/${slug}.png`;
}

function selectArticle(name) {
  activeArticle = name;
  updateSaisies(getPlisFromArticle(name));
  const imgEl = document.getElementById('articleImg');
  const svgEl = document.getElementById('articleSvgFallback');
  if (!imgEl || !svgEl) return;
  if (!name) { imgEl.style.display='none'; svgEl.style.display=''; return; }
  const art = PLIALU_ARTICLES.find(a => a.article === name);
  const file = (art && art.img) ? art.img : null;
  const url  = file ? `img/pieces/${file}` : getArticleImageUrl(name);
  imgEl.onload  = () => { imgEl.style.display='block'; svgEl.style.display='none'; };
  imgEl.onerror = () => { imgEl.style.display='none';  svgEl.style.display=''; };
  imgEl.src = url;
}

function getPlisFromArticle(name) {
  if (!name) return 2;
  const n = name.toLowerCase();
  if (/4.?plis?|bv4/.test(n)) return 4;
  if (/3.?plis?|bv3/.test(n)) return 3;
  if (/2.?plis?|bv2/.test(n)) return 2;
  if (/1.?pli|bv1/.test(n))   return 1;
  return 2;
}

function updateSaisies(n) {
  const faces  = ['A','B','C','D','E'].slice(0, n + 1);
  const angles = ['pliA','pliB','pliC','pliD'].slice(0, n);
  const c = document.getElementById('saisiesContainer');
  c.innerHTML = '';
  faces.forEach(f => {
    const row = document.createElement('div');
    row.className = 'saisie-row';
    row.innerHTML = `<label>Face ${f} mm</label><input id="saisie${f}" type="number" placeholder="0" min="0">`;
    c.appendChild(row);
  });
  angles.forEach(a => {
    const row = document.createElement('div');
    row.className = 'saisie-row dim-angle';
    row.innerHTML = `<label>${a} °</label><input id="${a}" type="number" placeholder="90" value="90" min="0" max="180">`;
    c.appendChild(row);
  });
}

document.getElementById('article').addEventListener('change', e => selectArticle(e.target.value));
document.getElementById('gammeSelect').addEventListener('change', e => selectFamille(e.target.value));

renderGammes();
renderArticles();
updateSaisies(2);
// ── Bloc B1 : update + renderFlat + render3D ──

function readSaisies() {
  const n=getPlisFromArticle(activeArticle);
  const fN=['A','B','C','D','E'].slice(0,n+1);
  const aN=['pliA','pliB','pliC','pliD'].slice(0,n);
  const fV=fN.map(f=>parseFloat((document.getElementById('saisie'+f)||{}).value)||0);
  const aV=aN.map(a=>parseFloat((document.getElementById(a)||{}).value)||90);
  return {fN,aN,fV,aV};
}

function mkProfile(fV,aV) {
  let dir=0; const pts=[{x:0,y:0}];
  fV.forEach((len,i)=>{
    const r=dir*Math.PI/180,p=pts[pts.length-1];
    pts.push({x:p.x+Math.cos(r)*len,y:p.y+Math.sin(r)*len});
    if(i<aV.length) dir-=(180-aV[i]);
  });
  return pts;
}

function update() {
  const {fN,aN,fV,aV}=readSaisies();
  const Lg   =parseFloat(document.getElementById('saisieLongueur').value)||0;
  const mat  =activeMaterial ? getMaterialById(activeMaterial) : null;
  const ep   =mat ? mat.thickness : 0.75;
  const ral  =mat ? mat.ral   : '';
  const fin  =mat ? mat.finish : '';
  const qte  =Math.max(1,parseInt(document.getElementById('quantite').value)||1);
  const tarif=PLIALU_TARIFS_FAM[mat ? mat.family : null] || 18;
  const sum  =fV.reduce((s,v)=>s+v,0);
  const dvp  =Math.max(0,sum-aV.reduce((s,a)=>s+ep*(a/90)*0.4,0));
  const surf =dvp&&Lg?(dvp/1000)*(Lg/1000):0;
  const puHT =surf?(surf*tarif)/0.65:0;
  document.getElementById('resDvp').textContent       =dvp ?dvp.toFixed(1)+' mm':'—';
  document.getElementById('resSurface').textContent    =surf?surf.toFixed(4)+' m²':'—';
  document.getElementById('resPrixUnit').textContent   =puHT?puHT.toFixed(2)+' €':'—';
  document.getElementById('resPrixTotal').textContent  =puHT?(puHT*qte).toFixed(2)+' €':'—';
  const refMat=mat ? mat.name : buildRefMatiere(ep,ral,fin);
  document.getElementById('resRefMat').textContent=refMat||'—';
  const fo={}; fN.forEach((f,i)=>{if(fV[i]>0)fo[f]=fV[i];});
  const refPiece=buildRefPiece(activeFamille,fo);
  const fs=fN.map((f,i)=>fV[i]?fV[i]:null).filter(Boolean).join('+');
  document.getElementById('resultDesignation').value=
    activeArticle&&fs?`${activeFamille} ${activeArticle} - ${refMat} - ${fs} - Lg ${Lg}mm`:'';
  renderFlat(fN,fV,aV);
  render3D(fN,fV,aV,Lg);
}

function renderFlat(fN,fV,aV) {
  const svg=document.getElementById('flatSvg'),ph=document.getElementById('flatPlaceholder');
  const sum=fV.reduce((s,v)=>s+v,0);
  if(!sum){svg.style.display='none';ph.style.display='';return;}
  svg.style.display='';ph.style.display='none';
  const W=400,H=160,cy=H/2,fh=36,sc=Math.min((W-40)/sum,4);
  let x=20,out=`<defs><pattern id="hh" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#e3e6ea" stroke-width="1.5"/></pattern></defs>`;
  fV.forEach((len,i)=>{
    if(!len)return; const w=len*sc;
    out+=`<rect x="${x}" y="${cy-fh/2}" width="${w}" height="${fh}" fill="url(#hh)" stroke="#3b82f6" stroke-width="1.5"/>`;
    out+=`<text x="${x+w/2}" y="${cy-fh/2-6}" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="bold">${fN[i]}</text>`;
    out+=`<text x="${x+w/2}" y="${cy+fh/2+12}" text-anchor="middle" font-size="9" fill="#6b7280">${len}</text>`;
    if(i<aV.length){
      out+=`<line x1="${x+w}" y1="${cy-fh/2-6}" x2="${x+w}" y2="${cy+fh/2+6}" stroke="#c026d3" stroke-width="1.5" stroke-dasharray="3,2"/>`;
      out+=`<text x="${x+w+2}" y="${cy-fh/2-8}" font-size="8" fill="#c026d3">${aV[i]}°</text>`;
    }
    x+=w;
  });
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.innerHTML=out;
}

function render3D(fN,fV,aV,Lg) {
  const svg=document.getElementById('iso3d'),ph=document.getElementById('isoPlaceholder');
  const sum=fV.reduce((s,v)=>s+v,0);
  if(!sum||!Lg){svg.style.display='none';ph.style.display='';return;}
  svg.style.display='';ph.style.display='none';
  const pts=mkProfile(fV,aV);
  const LV=Math.min(Lg,sum*2.5),c30=Math.cos(Math.PI/6);
  const iso=(px,py,z)=>({x:(px-z)*c30,y:py+(px+z)*.5});
  const rw=[];pts.forEach(p=>{rw.push(iso(p.x,p.y,0));rw.push(iso(p.x,p.y,LV));});
  const xs=rw.map(p=>p.x),ys=rw.map(p=>p.y);
  const bx=Math.min(...xs),bX=Math.max(...xs),by=Math.min(...ys),bY=Math.max(...ys);
  const W=400,H=280,PAD=36,sc=Math.min((W-PAD*2)/((bX-bx)||1),(H-PAD*2)/((bY-by)||1));
  const ox=W/2-(bx+(bX-bx)/2)*sc,oy=H/2-(by+(bY-by)/2)*sc;
  const S=(px,py,z=0)=>{const p=iso(px,py,z);return{x:p.x*sc+ox,y:p.y*sc+oy};};
  const CL=['rgba(147,197,253,.5)','rgba(167,243,208,.5)','rgba(253,230,138,.5)','rgba(248,180,180,.5)','rgba(196,181,253,.5)'];
  let out='';
  fV.forEach((len,i)=>{
    if(!len)return;
    const a=S(pts[i].x,pts[i].y,0),b=S(pts[i+1].x,pts[i+1].y,0),c=S(pts[i+1].x,pts[i+1].y,LV),d=S(pts[i].x,pts[i].y,LV);
    out+=`<polygon points="${a.x},${a.y} ${b.x},${b.y} ${c.x},${c.y} ${d.x},${d.y}" fill="${CL[i%5]}" stroke="#374151" stroke-width="1.2"/>`;
    out+=`<text x="${(a.x+b.x)/2}" y="${(a.y+b.y)/2}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#c026d3" font-weight="bold">${fN[i]}</text>`;
  });
  const bk=pts.map((p,i)=>{const s=S(p.x,p.y,LV);return(i?'L':'M')+s.x+','+s.y;}).join('');
  const fr=pts.map((p,i)=>{const s=S(p.x,p.y,0);return(i?'L':'M')+s.x+','+s.y;}).join('');
  const p0=S(pts[0].x,pts[0].y,0),p1=S(pts[0].x,pts[0].y,LV);
  out+=`<path d="${bk}" fill="none" stroke="#9ca3af" stroke-width="1"/>`;
  out+=`<path d="${fr}" fill="none" stroke="#111" stroke-width="2"/>`;
  out+=`<text x="${(p0.x+p1.x)/2}" y="${Math.min(p0.y,p1.y)-4}" text-anchor="middle" font-size="9" fill="#3b82f6">Lg ${Lg}mm</text>`;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.innerHTML=out;
}

// Wiring : debounce toutes les saisies → update()
let _ut;
function _onInput(){clearTimeout(_ut);_ut=setTimeout(update,120);}
['paramEpaisseur','paramRal','paramFinition','quantite','saisieLongueur'].forEach(id=>{
  const el=document.getElementById(id);
  if(el){el.addEventListener('input',_onInput);el.addEventListener('change',_onInput);}
});
document.getElementById('saisiesContainer').addEventListener('input',_onInput);
document.getElementById('article').addEventListener('change',()=>setTimeout(update,80));

// ── Autocomplete matière ──
function selectMaterial(m) {
  activeMaterial = m.id;
  document.getElementById('matInput').value = m.name;
  document.getElementById('matDropdown').style.display = 'none';
  update();
}

function setupMatAutocomplete() {
  const inp = document.getElementById('matInput');
  const dd  = document.getElementById('matDropdown');
  let focusIdx = -1;

  inp.addEventListener('input', () => {
    const q = inp.value.trim();
    focusIdx = -1;
    if (q.length < 2) { dd.style.display = 'none'; return; }
    const res = searchMaterials(q, 15);
    if (!res.length) { dd.style.display = 'none'; return; }
    dd.innerHTML = res.map((m, i) =>
      `<div class="mat-opt" data-idx="${i}"><strong>${m.name}</strong><small>${m.family} — ${m.thickness} mm</small></div>`
    ).join('');
    dd._res = res;
    dd.style.display = 'block';
    dd.querySelectorAll('.mat-opt').forEach(el =>
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        selectMaterial(dd._res[+el.dataset.idx]);
      })
    );
  });

  inp.addEventListener('keydown', e => {
    const opts = dd.querySelectorAll('.mat-opt');
    if (!opts.length) return;
    if (e.key === 'ArrowDown') { focusIdx = Math.min(focusIdx+1, opts.length-1); }
    else if (e.key === 'ArrowUp') { focusIdx = Math.max(focusIdx-1, 0); }
    else if (e.key === 'Enter' && focusIdx >= 0) { e.preventDefault(); selectMaterial(dd._res[focusIdx]); return; }
    else if (e.key === 'Escape') { dd.style.display='none'; return; }
    opts.forEach((o,i) => o.classList.toggle('focused', i === focusIdx));
  });

  inp.addEventListener('blur', () => setTimeout(() => { dd.style.display = 'none'; }, 160));
}

setupMatAutocomplete();

// ── Bloc B2-1 : Devis ──
let devisLignes = [];

function parseChip(id) { return parseFloat((document.getElementById(id)||{}).textContent)||0; }

function addToDevis() {
  if (!activeMaterial)                    { showToast('⚠ Sélectionnez une matière','err'); return; }
  const Lg = parseFloat(document.getElementById('saisieLongueur').value)||0;
  if (!Lg)                                { showToast('⚠ Saisissez la longueur','err'); return; }
  const dvp = parseChip('resDvp');
  if (!dvp)                               { showToast('⚠ Saisissez les cotes','err'); return; }
  const puHT  = parseChip('resPrixUnit');
  const qte   = Math.max(1, parseInt(document.getElementById('quantite').value)||1);
  const mat   = getMaterialById(activeMaterial);
  devisLignes.push({
    id: Date.now(),
    designation: document.getElementById('resultDesignation').value || (activeFamille+' '+activeArticle),
    refMat: mat ? mat.name : activeMaterial,
    dvp, lg: Lg, qte, puHT,
    totalHT: puHT * qte,
    svgFlat: document.getElementById('flatSvg').innerHTML,
    svgIso:  document.getElementById('iso3d').innerHTML
  });
  renderDevis(); saveDevisSession(); showToast('✓ Ajouté');
}

function renderDevis() {
  const cont  = document.getElementById('devisLignes');
  const empty = document.getElementById('devisEmpty');
  cont.querySelectorAll('.ligne-item').forEach(el => el.remove());
  empty.style.display = devisLignes.length ? 'none' : '';
  devisLignes.forEach(l => {
    const div = document.createElement('div');
    div.className = 'ligne-item';
    div.innerHTML =
      `<div class="li-thumb"><svg viewBox="0 0 400 280" style="width:100%;height:100%">${l.svgIso}</svg></div>`+
      `<div class="li-info"><div class="li-ref" title="${l.designation}">${l.designation}</div>`+
      `<div class="li-sub">${l.refMat} — DVP ${(+l.dvp).toFixed(0)} mm — Lg ${l.lg} mm</div></div>`+
      `<input class="li-qte" type="number" value="${l.qte}" min="1" `+
        `style="width:38px;border:1px solid var(--line);border-radius:3px;padding:2px 4px;font-size:11px;text-align:center;">`+
      `<div class="li-pu">${(+l.puHT).toFixed(2)} €</div>`+
      `<div class="li-pu" style="font-weight:700;">${(+l.totalHT).toFixed(2)} €</div>`+
      `<span class="li-del" title="Supprimer">✕</span>`;
    div.querySelector('.li-qte').addEventListener('change', e => {
      const idx = devisLignes.findIndex(x => x.id === l.id);
      if (idx < 0) return;
      devisLignes[idx].qte = Math.max(1, +e.target.value||1);
      devisLignes[idx].totalHT = devisLignes[idx].puHT * devisLignes[idx].qte;
      renderDevis(); saveDevisSession();
    });
    div.querySelector('.li-del').addEventListener('click', () => {
      devisLignes = devisLignes.filter(x => x.id !== l.id);
      renderDevis(); saveDevisSession();
    });
    cont.insertBefore(div, empty);
  });
  const ht = devisLignes.reduce((s, l) => s + (+l.totalHT), 0);
  document.getElementById('tHT').textContent  = _fmt(ht);
  document.getElementById('tTVA').textContent = _fmt(ht * .2);
  document.getElementById('tTTC').textContent = _fmt(ht * 1.2);
}

function _fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

function saveDevisSession() {
  try { localStorage.setItem('plialu-session', JSON.stringify({devisLignes})); } catch(e) {}
}

function showToast(msg, type='ok') {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div'); t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.style.background = type === 'err' ? '#e11d48' : '#1a1f2e';
  t.style.color = type === 'err' ? '#fff' : '#cbff00';
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t); t._t = setTimeout(() => { t.style.opacity = '0'; }, 2200);
}

document.getElementById('btnAjouterDevis').addEventListener('click', addToDevis);
document.getElementById('btnVider').addEventListener('click', () => {
  if (!devisLignes.length || confirm('Vider le devis en cours ?')) {
    devisLignes = []; renderDevis(); saveDevisSession();
  }
});

try {
  const _s = JSON.parse(localStorage.getItem('plialu-session') || '{}');
  if (_s.devisLignes) { devisLignes = _s.devisLignes; renderDevis(); }
} catch(e) {}

// ── Bloc B2-2 : PDF ──
function _svgToPng(svgStr, w, h) {
  return new Promise(res => {
    if (!svgStr) return res(null);
    const blob = new Blob([svgStr], {type:'image/svg+xml'});
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.onload = () => {
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url); res(c.toDataURL('image/png'));
    };
    img.onerror = () => { URL.revokeObjectURL(url); res(null); };
    img.src = url;
  });
}

async function genererPDF() {
  if (!devisLignes.length) { showToast('⚠ Devis vide','err'); return; }
  const jsPDF = window.jspdf?.jsPDF;
  if (!jsPDF) { showToast('⚠ jsPDF non chargé','err'); return; }
  const imgs = await Promise.all(devisLignes.map(l => _svgToPng(l.svgIso, 180, 120)));
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const PW=210, PH=297, ML=14, MR=14, CW=182;
  const DARK=[26,31,46], WHITE=[255,255,255], GREY=[248,248,250];
  // ── En-tête ──
  doc.setFillColor(...DARK); doc.rect(0,0,PW,26,'F');
  doc.setTextColor(203,255,0); doc.setFont('helvetica','bold'); doc.setFontSize(15);
  doc.text('● PLIALU', ML, 11);
  doc.setTextColor(160,175,190); doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text('Façonnage aluminium sur mesure', ML, 17);
  const num='DEV-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*900+100));
  doc.setTextColor(203,255,0); doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('DEVIS', PW-MR, 10, {align:'right'});
  doc.setFontSize(8); doc.text(num, PW-MR, 16, {align:'right'});
  // ── Client ──
  let y=32;
  const client  = document.getElementById('inputClient')?.value||'—';
  const affaire = document.getElementById('inputAffaire')?.value||'—';
  doc.setTextColor(40,42,54); doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(`Client : ${client}`,  ML, y);
  doc.text(`Affaire : ${affaire}`, ML, y+5);
  doc.text(`Date : ${new Date().toLocaleDateString('fr-FR')}   |   Validité : 30 jours`, ML, y+10);
  y+=17;
  // ── En-têtes tableau ──
  const COLS=[{l:'Désignation',w:68},{l:'Réf mat.',w:28},{l:'DVP mm',w:16},
              {l:'Lg mm',w:16},{l:'Qté',w:10},{l:'PU HT €',w:22},{l:'Total HT €',w:22}];
  doc.setFillColor(...DARK); doc.rect(ML,y,CW,7,'F');
  doc.setTextColor(...WHITE); doc.setFont('helvetica','bold'); doc.setFontSize(7.5);
  let cx=ML+2; COLS.forEach(c=>{doc.text(c.l,cx,y+4.8);cx+=c.w;}); y+=7;
  // ── Lignes ──
  for (let i=0;i<devisLignes.length;i++) {
    const l=devisLignes[i], RH=22;
    if (y+RH>PH-22) { _addFooter(doc,PW,PH); doc.addPage(); y=14; }
    if (i%2) { doc.setFillColor(...GREY); doc.rect(ML,y,CW,RH,'F'); }
    if (imgs[i]) try { doc.addImage(imgs[i],'PNG',ML+1,y+1,28,18); } catch(e){}
    doc.setTextColor(40,42,54); doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
    doc.text((l.designation||'—').slice(0,42), ML+31, y+7);
    doc.setFontSize(7); cx=ML+COLS[0].w+2;
    [l.refMat||'—', (+l.dvp).toFixed(0), ''+l.lg, ''+l.qte,
     (+l.puHT).toFixed(2), (+l.totalHT).toFixed(2)]
      .forEach((v,j)=>{doc.text(v,cx,y+11);cx+=COLS[j+1].w;});
    y+=RH;
  }
  // ── Totaux ──
  y+=5;
  const ht=devisLignes.reduce((s,l)=>s+(+l.totalHT),0), tva=ht*.2;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(40,42,54);
  doc.text('Total HT',  PW-MR-44,y); doc.text(ht.toFixed(2)+' €', PW-MR,y,{align:'right'}); y+=6;
  doc.text('TVA 20 %',  PW-MR-44,y); doc.text(tva.toFixed(2)+' €',PW-MR,y,{align:'right'}); y+=3;
  doc.setFillColor(...DARK); doc.rect(PW-MR-56,y,56,9,'F');
  doc.setTextColor(203,255,0); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Total TTC', PW-MR-54,y+6);
  doc.text((ht+tva).toFixed(2)+' €', PW-MR-1,y+6,{align:'right'});
  _addFooter(doc,PW,PH);
  doc.save(`PLIALU_${num}.pdf`);
}

function _addFooter(doc,PW,PH) {
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(150,155,165);
  doc.text('PLIALU — Façonnage aluminium sur mesure', 14, PH-5);
  doc.text('Page '+doc.internal.getCurrentPageInfo().pageNumber, PW-14, PH-5,{align:'right'});
}

document.getElementById('btnGenPDF').addEventListener('click', genererPDF);
document.getElementById('btnGenererPDF').addEventListener('click', genererPDF);

})();
